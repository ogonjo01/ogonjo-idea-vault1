[build]
  command = "npm run build"
  functions = "netlify/functions"
  publish = "dist"

[dev]
  functions = "netlify/functions"
  command = "npm run dev"
  port = 8081         # Netlify proxy
  targetPort = 8082   # Actual Vite server (based on your logs)


[[redirects]]
  from = "/api/ai-advisor"
  to = "/.netlify/functions/ai-advisor"
  status = 200